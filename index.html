<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#D6EBFB">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>플랜</title>
<script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
<style>
  :root{
    --void:#0A0E1A; --solid:#FFFFFF;
    --ink:#141A2E; --ink2:#5A6896; --ink3:#9AA3BD;
    --bg2:rgba(120,130,160,.13); --line2:rgba(120,130,160,.14);
    --accent:#4C6FFF; --accent2:#8B5CF6; --accent-soft:rgba(76,111,255,.14);
    --warn:#FF3B30; --warn-soft:rgba(255,59,48,.13);
    --ok:#10B981; --ok-soft:rgba(16,185,129,.13);
    --glass-bg:radial-gradient(150% 100% at 3% -12%, rgba(255,255,255,.85), transparent 42%), linear-gradient(165deg, rgba(255,255,255,.6), rgba(255,255,255,.32));
    --glass-brd:rgba(255,255,255,.7);
    --glass-shadow:0 16px 40px rgba(40,50,90,.16), 0 3px 10px rgba(40,50,90,.10), inset 0 1px 0 rgba(255,255,255,.95), inset 0 10px 24px -12px rgba(255,255,255,.7), inset 0 -14px 28px -16px rgba(60,70,110,.12);
    --glass-blur:blur(20px) saturate(180%) brightness(1.04);
    --field-brd:rgba(120,130,160,.2);
    --r:26px; --r-sm:18px; --r-xs:13px;
    --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px); --dock-h:72px;
  }
  html[data-theme="dark"]{
    --void:#D6EBFB; --solid:#FFFFFF;
    --ink:#0B1724; --ink2:#293648; --ink3:#48576E;
    --bg2:rgba(20,45,90,.05); --line2:rgba(20,45,90,.1);
    --accent:#62B0DC; --accent2:#8FCBEC; --accent-d:#4E9DCB; --accent-soft:rgba(98,176,220,.14);
    --warn:#FF3B30; --warn-soft:rgba(255,59,48,.12);
    --ok:#0FB981; --ok-soft:rgba(15,185,129,.14);
    --glass-bg:radial-gradient(120% 95% at 0% -5%, rgba(255,255,255,.16), rgba(255,255,255,.08) 32%, rgba(255,255,255,.03) 62%), linear-gradient(165deg, rgba(255,255,255,.09), rgba(255,255,255,.03));
    --glass-brd:rgba(255,255,255,.5);
    --glass-shadow:0 22px 44px -16px rgba(30,70,130,.24), 0 7px 18px -8px rgba(30,70,130,.16), inset 0 1.2px 0 rgba(255,255,255,.7), inset 0 -2px 1px rgba(120,140,180,.12), inset 0 16px 30px -24px rgba(255,255,255,.5);
    --glass-blur:blur(30px) saturate(175%) brightness(1.06);
    --field-brd:rgba(30,70,130,.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
  input,textarea,[contenteditable]{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;}
  html,body{margin:0;padding:0;height:100%;background:var(--void);overscroll-behavior-y:none;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Pretendard","SF Pro Display","Apple SD Gothic Neo","Segoe UI",system-ui,sans-serif;
    color:var(--ink);-webkit-font-smoothing:antialiased;overscroll-behavior-y:none;line-height:1.45;transition:background .3s,color .3s;}
  body::before{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;background:#D6EBFB;}
  body::after{display:none;}
  html[data-theme="dark"] body::after{background:radial-gradient(120% 90% at 50% 0%, rgba(255,255,255,.26), transparent 55%);}
  @keyframes drift{0%{transform:translate3d(0,0,0) scale(1)}33%{transform:translate3d(-2.5%,2%,0) scale(1.07)}66%{transform:translate3d(2%,-1.5%,0) scale(1.04)}100%{transform:translate3d(0,0,0) scale(1)}}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0;}
  input,textarea,select{font-family:inherit;color:inherit;}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
  ::-webkit-scrollbar{display:none;}
  .app{position:fixed;top:0;right:0;bottom:0;left:0;height:100%;}
  .scroll{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:none;padding:calc(var(--safe-t) + 12px) 16px calc(var(--dock-h) + 26px);}

  /* ===== glass material ===== */
  .card,.chartcard,.block,.dcard,.statbox,.memocard,.overdue,.sheet,.as-card,.as-cancel,.dock-bar,.dock-search,.iconbtn,.arw,.parw{
    background:var(--glass-bg);border:1px solid var(--glass-brd);box-shadow:var(--glass-shadow);
    -webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);}
  /* springy tactile press */
  .card,.dcard,.statbox,.memocard,.overdue,.iconbtn,.nb,.btn,.catchip,.cell,.minibtn,.as-btn,.arw,.parw,.dock-search,.timerbtn,.addbtn,.ghostbtn,.sheetx,.toggle{transition:transform .24s cubic-bezier(.34,1.5,.6,1),background .2s,box-shadow .2s,color .2s;}
  .toggle.on,.seg-w button.on,.dows button.on{box-shadow:inset 0 1.5px 0 rgba(255,255,255,.5),0 5px 14px var(--accent-soft);}

  .head{display:flex;align-items:flex-end;justify-content:space-between;padding:8px 4px 16px;}
  .head .ttl{font-size:27px;font-weight:800;letter-spacing:-.9px;line-height:1;}
  .head .sub{font-size:13px;color:var(--ink2);font-weight:600;margin-top:5px;}
  .iconbtn{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--ink2);}
  .iconbtn:active{transform:scale(.9);}
  .eyebrow{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin:22px 4px 10px;display:flex;align-items:center;justify-content:space-between;}
  .eyebrow .add{color:var(--accent);font-size:12.5px;letter-spacing:0;text-transform:none;font-weight:700;}
  .card{border-radius:var(--r);padding:17px;}
  .empty{color:var(--ink3);font-size:13px;text-align:center;padding:26px 14px;background:var(--glass-bg);border:1px solid var(--glass-brd);border-radius:var(--r);box-shadow:var(--glass-shadow);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);font-weight:500;line-height:1.6;}
  .hjfold{display:flex;align-items:center;gap:7px;padding:9px 5px;cursor:pointer;font-weight:700;font-size:14px;color:var(--ink);border-radius:10px;}
  .hjfold:active{background:var(--bg2);transform:scale(.995);}
  .hjcaret{display:inline-block;transition:transform .18s;color:var(--ink3);font-size:11px;flex:0 0 auto;width:11px;}
  .hjcaret.open{transform:rotate(90deg);}
  .hjfname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1 1 auto;min-width:0;}
  .hjcount{color:var(--ink3);font-size:11px;font-weight:600;flex:0 0 auto;}
  .hjfile{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 5px;text-decoration:none;color:var(--ink2);font-size:13.5px;font-weight:500;}
  .hjfnm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1 1 auto;min-width:0;}
  .hjgh{color:var(--accent);font-size:12px;font-weight:700;flex:0 0 auto;}

  /* streak */
  .streak{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:800;color:var(--accent);background:var(--accent-soft);padding:6px 13px;border-radius:30px;border:1px solid var(--glass-brd);box-shadow:inset 0 1px 0 rgba(255,255,255,.4);}

  /* dday rail */
  .rail{display:flex;gap:10px;overflow-x:auto;padding:8px 2px 18px;-webkit-overflow-scrolling:touch;touch-action:pan-x;}
  #view{touch-action:pan-y;}
  .dcard{flex:0 0 auto;min-width:76px;border-radius:16px;padding:9px 12px 9px;position:relative;overflow:hidden;}
  .dcard::after{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--dc,var(--accent));border-radius:4px;box-shadow:0 0 12px var(--dc,var(--accent));}
  .dcard .nm{font-size:10px;font-weight:700;color:var(--ink2);margin-bottom:4px;display:flex;align-items:center;gap:5px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .dcard .dot{width:5px;height:5px;border-radius:50%;flex:0 0 auto;}
  .dcard .big{font-size:18px;font-weight:800;letter-spacing:-.5px;line-height:1;color:var(--dc,var(--ink));}
  .dcard .sub{font-size:9px;color:var(--ink3);margin-top:3px;font-weight:600;}
  .dcard.risk .nm::before{content:"⚠ ";}

  /* overdue */
  .overdue{border-radius:var(--r);padding:15px 16px;background:radial-gradient(150% 100% at 3% -12%, rgba(255,107,107,.16), transparent 50%), linear-gradient(165deg, rgba(255,107,107,.12), rgba(255,107,107,.04));border-color:rgba(255,107,107,.3);}
  .overdue .ohd{display:flex;align-items:center;justify-content:space-between;font-size:13.5px;font-weight:800;color:var(--warn);}
  .overdue .orow{display:flex;align-items:center;gap:8px;padding:10px 0;border-top:1px solid rgba(255,107,107,.18);font-size:14px;}
  .overdue .orow:first-of-type{margin-top:9px;}
  .overdue .od{font-size:11px;color:var(--warn);font-weight:700;background:rgba(255,107,107,.16);padding:2px 8px;border-radius:30px;}
  .overdue .otxt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .minibtn{font-size:11.5px;font-weight:700;padding:7px 11px;border-radius:30px;background:rgba(127,140,180,.14);color:var(--accent);border:1px solid var(--glass-brd);box-shadow:inset 0 1px 0 rgba(255,255,255,.35);}
  .minibtn:active{transform:scale(.93);}

  /* study ring */
  .studywrap{display:flex;align-items:center;gap:20px;}
  .ring{position:relative;width:114px;height:114px;flex:0 0 auto;}
  .ring svg{transform:rotate(-90deg);filter:drop-shadow(0 2px 8px var(--accent-soft));}
  .ring .rc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring .pct{font-size:26px;font-weight:800;letter-spacing:-1.2px;line-height:1;}
  .ring .pl{font-size:10px;color:var(--ink3);font-weight:700;margin-top:3px;}
  .studyinfo{flex:1;min-width:0;}
  .studyinfo .elapsed{font-size:33px;font-weight:800;letter-spacing:-1.4px;line-height:1;}
  .studyinfo .goal{font-size:12.5px;color:var(--ink2);font-weight:600;margin-top:5px;}
  .studyinfo .goal b{color:var(--accent);cursor:pointer;border-bottom:1px dashed var(--ink3);}
  .timerbtn{margin-top:13px;width:100%;height:48px;border-radius:16px;font-size:15px;font-weight:800;color:#fff;
    background:linear-gradient(135deg, var(--accent), var(--accent2));display:flex;align-items:center;justify-content:center;gap:7px;
    box-shadow:0 8px 22px var(--accent-soft), inset 0 1px 0 rgba(255,255,255,.5), inset 0 -8px 16px -8px rgba(0,0,0,.25);}
  .timerbtn.running{background:linear-gradient(135deg, #FF6B6B, #FF4D8D);box-shadow:0 8px 22px rgba(255,107,107,.3), inset 0 1px 0 rgba(255,255,255,.5);}
  .timerbtn:active{transform:scale(.98);}

  /* daily log */
  .logrow{display:flex;gap:11px;}
  .logfield{flex:1;}
  .logfield label{display:block;font-size:11px;font-weight:800;color:var(--ink3);letter-spacing:.5px;margin-bottom:7px;}
  .timeinput{width:100%;height:48px;border-radius:16px;background:var(--bg2);border:1px solid var(--field-brd);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--ink);-webkit-appearance:none;text-align:center;box-shadow:inset 0 1px 2px rgba(0,0,0,.06);}
  input.timeinput::-webkit-date-and-time-value{text-align:center;}
  .timeinput:focus{outline:none;border-color:var(--accent);}
  .scorerow{display:flex;align-items:center;gap:15px;}
  .scorehd{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;}
  .scorehd label{font-size:13px;font-weight:800;color:var(--ink2);margin:0;letter-spacing:0;}
  .scoreval{font-size:26px;font-weight:800;min-width:46px;text-align:right;color:var(--accent);letter-spacing:-1.2px;}
  input[type=range].sl{display:block;width:100%;margin:0;-webkit-appearance:none;appearance:none;height:6px;border-radius:4px;background:var(--bg2);outline:none;}
  input[type=range].sl::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#fff,#E8ECFF);box-shadow:0 2px 8px rgba(0,0,0,.3),inset 0 0 0 2px var(--accent);}
  input[type=range].sl::-moz-range-thumb{width:28px;height:28px;border:none;border-radius:50%;background:#fff;box-shadow:inset 0 0 0 2px var(--accent);}
  input[type=range].sl.cond::-webkit-slider-thumb{box-shadow:0 2px 8px rgba(0,0,0,.3),inset 0 0 0 2px var(--ok);}
  input[type=range].sl.cond::-moz-range-thumb{box-shadow:inset 0 0 0 2px var(--ok);}
  .slticks{display:flex;justify-content:space-between;font-size:10px;color:var(--ink3);font-weight:700;padding:0 14px;margin:7px 0 0;}
  .slticks span{width:0;display:flex;justify-content:center;white-space:nowrap;}
  .noteinput{width:100%;min-height:58px;border-radius:16px;background:var(--bg2);border:1px solid var(--field-brd);padding:13px 14px;font-size:14.5px;resize:none;line-height:1.5;box-shadow:inset 0 1px 2px rgba(0,0,0,.05);}
  .noteinput:focus{outline:none;border-color:var(--accent);}
  .noteinput::placeholder{color:var(--ink3);}

  /* checklist */
  .clist{display:flex;flex-direction:column;}
  .citem{display:flex;align-items:center;gap:13px;padding:13px 2px;border-bottom:1px solid var(--line2);position:relative;background:var(--bg,transparent);touch-action:pan-y;}
  .citem.dragging{z-index:50;border-radius:14px;box-shadow:0 10px 26px rgba(30,60,100,.22),0 2px 8px rgba(30,60,100,.12);background:var(--glass-bg);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);}
  .citem:last-child{border-bottom:none;}
  .cbox{width:24px;height:24px;box-sizing:border-box;border-radius:8px;border:2px solid var(--ink3);flex:0 0 auto;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s;overflow:hidden;-webkit-mask-image:-webkit-radial-gradient(white,white);}
  .cbox.done{background:linear-gradient(135deg,var(--accent),var(--accent2));border:0;}
  .cbox.done::after{content:"✓";color:#fff;font-size:14px;font-weight:900;line-height:1;}
  .ctxt{flex:1;font-size:15px;min-width:0;}
  .ctxt.done{color:var(--ink3);text-decoration:line-through;}
  .ctag{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:30px;flex:0 0 auto;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border:1px solid rgba(255,255,255,.14);}
  .ctag.rep::before{content:"↻ ";}
  .cdel{color:var(--ink3);font-size:18px;width:28px;text-align:center;flex:0 0 auto;}
  .cdel:active{color:var(--warn);}
  .addrow{display:flex;gap:10px;margin-top:13px;align-items:center;}
  .addrow input{flex:1;min-width:0;height:48px;border-radius:16px;background:var(--bg2);border:1px solid var(--field-brd);padding:0 15px;font-size:15px;box-shadow:inset 0 1px 2px rgba(0,0,0,.05);}
  .addrow input:focus{outline:none;border-color:var(--accent);}
  .addbtn{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:25px;font-weight:300;flex:0 0 auto;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px var(--accent-soft),inset 0 1px 0 rgba(255,255,255,.5);}
  .addbtn:active{transform:scale(.93);}
  .catchip{height:48px;padding:0 13px;border-radius:16px;background:var(--bg2);font-size:12.5px;font-weight:700;color:var(--ink2);display:flex;align-items:center;gap:6px;flex:0 0 auto;max-width:116px;overflow:hidden;white-space:nowrap;border:1px solid var(--field-brd);}
  .catchip .cdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
  .catchip:active{transform:scale(.96);}
  .catlist{display:flex;flex-direction:column;gap:6px;max-height:52vh;overflow-y:auto;-webkit-overflow-scrolling:touch;margin-bottom:2px;}
  .catopt{display:flex;align-items:center;gap:11px;width:100%;padding:13px 15px;border-radius:14px;background:var(--bg2);border:1.5px solid transparent;font-size:15px;font-weight:600;color:var(--ink);text-align:left;}
  .catopt:active{transform:scale(.985);}
  .catopt.on{border-color:var(--accent);background:var(--accent-soft);}
  .catopt .cdot{width:13px;height:13px;border-radius:50%;flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);}
  .catopt .cdot.none{background:transparent;box-shadow:inset 0 0 0 1.5px var(--ink3);}
  .catopt .cnm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .catopt .cattag{font-size:10.5px;font-weight:700;color:var(--ink3);background:rgba(127,140,180,.14);padding:3px 9px;border-radius:30px;flex:0 0 auto;}

  /* progress bar */
  .pbar{height:8px;border-radius:6px;background:var(--bg2);overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.1);}
  .pbar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s cubic-bezier(.22,.61,.36,1);}
  .pbar.ok i{background:linear-gradient(90deg,var(--ok),#22D3A8);}

  /* segmented */
  .segwrap{display:flex;background:var(--bg2);border-radius:16px;padding:4px;gap:4px;margin-bottom:6px;border:1px solid var(--field-brd);}
  .segwrap button{flex:1;height:40px;border-radius:12px;font-size:14px;font-weight:800;color:var(--ink2);transition:all .2s;}
  .segwrap button.on{background:var(--glass-bg);color:var(--ink);box-shadow:var(--glass-shadow);border:1px solid var(--glass-brd);}

  /* plan blocks */
  .block{border-radius:var(--r);margin-bottom:13px;overflow:hidden;}
  .bhd{display:flex;align-items:center;gap:12px;padding:16px 17px;}
  .bhd .swatch{width:12px;height:12px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 8px currentColor;}
  .bhd .bnm{font-size:16px;font-weight:800;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bhd .bdday{font-size:12px;font-weight:800;padding:4px 11px;border-radius:30px;background:var(--accent-soft);color:var(--accent);}
  .bhd .bdday.urgent{background:var(--warn-soft);color:var(--warn);}
  .bhd .chev{color:var(--ink3);font-size:14px;transition:transform .25s;}
  .bhd.open .chev{transform:rotate(180deg);}
  .bbody{padding:0 17px 15px;}
  .bmeta{display:flex;align-items:center;gap:11px;margin-bottom:12px;}
  .bmeta .pbar{flex:1;} .bmeta .ppct{font-size:12px;font-weight:800;color:var(--ink2);width:40px;text-align:right;}
  .exrow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--line2);font-size:13.5px;}
  .exrow .exnm{font-weight:700;color:var(--ink2);} .exrow .exd{font-size:11px;color:var(--ink3);font-weight:700;}
  .item{display:flex;align-items:center;gap:11px;padding:10px 0;border-top:1px solid var(--line2);}
  .item .ibox{width:21px;height:21px;border-radius:7px;border:2px solid var(--ink3);flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
  .item .ibox.done{background:linear-gradient(135deg,var(--ok),#22D3A8);border-color:transparent;} .item .ibox.done::after{content:"✓";color:#fff;font-size:11px;font-weight:900;}
  .item .subbul{width:6px;height:6px;border-radius:50%;background:var(--ink3);flex:0 0 auto;margin:0 8px;}
  .item .itxt{flex:1;font-size:14px;} .item .itxt.done{color:var(--ink3);text-decoration:line-through;}
  .item .idday{font-size:10.5px;font-weight:700;color:var(--ink3);} .item .idel{color:var(--ink3);font-size:15px;padding:0 4px;}
  .linkmemo{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--line2);font-size:13px;color:var(--ink2);}
  .linkmemo .lm{font-size:11px;}
  .ghostbtn{width:100%;margin-top:12px;height:42px;border-radius:13px;border:1.5px dashed var(--field-brd);color:var(--ink2);font-size:13px;font-weight:700;}
  .ghostbtn:active{background:var(--bg2);}

  /* calendar */
  .calhd{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 18px;}
  .calhd .mlabel{font-size:23px;font-weight:800;letter-spacing:-.6px;}
  .arw{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:21px;color:var(--ink2);}
  .arw:active{transform:scale(.9);}
  .caldow{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:12px;font-weight:800;color:var(--ink3);margin-bottom:9px;}
  .caldow .sun{color:var(--warn);}

function repeatHits(rep,s){const d=parseYmd(s),start=parseYmd(rep.start);if(d<start)return false;if(rep.end&&d>parseYmd(rep.end))return false;
  if(rep.freq==='daily')return true;if(rep.freq==='weekly')return (rep.weekdays||[]).includes(d.getDay());
  if(rep.freq==='interval')return Math.round((d-start)/864e5)%(rep.interval||1)===0;return false;}
function materialize(s){DB.repeats.forEach(rep=>{if(repeatHits(rep,s)&&!(rep.ex&&rep.ex.indexOf(s)>=0)&&!DB.tasks.some(t=>t.repeatId===rep.id&&t.date===s)){
  const t={id:uid(),date:s,text:rep.text,done:false,repeatId:rep.id};if(rep.projectId){t.projectId=rep.projectId;if(rep.mileId)t.mileId=rep.mileId;}
  placeTaskGrouped(t);DB.tasks.push(t);}});}

function projProgress(p){const tt=DB.tasks.filter(t=>t.projectId===p.id);const ms=p.milestones||[];const tot=tt.length+ms.length;if(!tot)return 0;return Math.round((tt.filter(t=>t.done).length+ms.filter(m=>m.done).length)/tot*100);}
function subjSortKey(sb){const exs=subjectExams(sb.id).filter(e=>e.date);if(!exs.length)return Infinity;
  const up=exs.filter(e=>diffDays(e.date,todayStr())>=0);return Math.min(...(up.length?up:exs).map(e=>parseYmd(e.date).getTime()));}
function projSortKey(p){const ds=[];(p.exams||[]).forEach(e=>{if(e.date)ds.push(parseYmd(e.date).getTime());});(p.milestones||[]).forEach(m=>{if(m.date&&!m.done)ds.push(parseYmd(m.date).getTime());});return ds.length?Math.min(...ds):Infinity;}

function streak(){let n=0,d=parseYmd(todayStr());if(!achieved(ymd(d)))d.setDate(d.getDate()-1);while(achieved(ymd(d))){n++;d.setDate(d.getDate()-1);}return n;}
function sleepHours(s){const cur=DB.days[s];if(!cur||!cur.wake)return null;
  const pd=parseYmd(s);pd.setDate(pd.getDate()-1);const prev=DB.days[ymd(pd)];if(!prev||!prev.sleep)return null;
  const[wh,wm]=cur.wake.split(':').map(Number),[sh,sm]=prev.sleep.split(':').map(Number);
  let dur=(wh*60+wm)-(sh*60+sm);if(dur<=0)dur+=1440;return dur/60;}

function attachReorder(listId,onDone){
  const list=document.getElementById(listId);if(!list||list._rb)return;list._rb=true;
  let items=[],dragEl=null,startY=0,itemH=60,fromIdx=-1,toIdx=-1,timer=null,active=false;
  const clr=()=>{clearTimeout(timer);timer=null;};
  list.addEventListener('touchstart',e=>{
    const it=e.target.closest('.citem');if(!it||!list.contains(it))return;
    if(e.target.closest('.cbox,.cdel'))return;
    if(it.querySelector('.cbox.done'))return;
    startY=e.touches[0].clientY;clr();
    timer=setTimeout(()=>{
      active=true;dragEl=it;items=[...list.querySelectorAll('.citem')].filter(x=>!x.querySelector('.cbox.done'));
      fromIdx=items.indexOf(it);toIdx=fromIdx;
      itemH=items.length>1?(items[1].getBoundingClientRect().top-items[0].getBoundingClientRect().top):it.getBoundingClientRect().height;
      items.forEach(x=>{if(x!==it)x.style.transition='transform .18s cubic-bezier(.3,1.2,.5,1)';});
      it.classList.add('dragging');it.style.transition='transform .04s';
      if(navigator.vibrate)navigator.vibrate(12);
    },240);
  },{passive:true});
  list.addEventListener('touchmove',e=>{
    if(!active){if(Math.abs(e.touches[0].clientY-startY)>8)clr();return;}
    e.preventDefault();
    const dy=e.touches[0].clientY-startY;
    dragEl.style.transform='translateY('+dy+'px) scale(1.03)';
    toIdx=Math.max(0,Math.min(items.length-1,fromIdx+Math.round(dy/itemH)));
    items.forEach((it,i)=>{if(it===dragEl)return;let sh=0;
      if(fromIdx<toIdx&&i>fromIdx&&i<=toIdx)sh=-itemH;
      else if(fromIdx>toIdx&&i>=toIdx&&i<fromIdx)sh=itemH;
      it.style.transform=sh?'translateY('+sh+'px)':'';});
  },{passive:false});
  const end=()=>{clr();if(!active)return;active=false;
    const el=dragEl,from=fromIdx,to=toIdx,its=items;dragEl=null;
    el.classList.remove('dragging');its.forEach(x=>{x.style.transition='';x.style.transform='';});
    if(to!==from){const ids=its.map(x=>x.dataset.id);const mv=ids.splice(from,1)[0];ids.splice(to,0,mv);
      ids.forEach((id,i)=>{const t=DB.tasks.find(z=>z.id===id);if(t)t.ord=i;});onDone();}};
  list.addEventListener('touchend',end);list.addEventListener('touchcancel',end);
}

function attachDockDrag(){const bar=document.getElementById('navtabs');if(!bar||bar._bound)return;bar._bound=true;

  const D=document.getElementById('dbg');const log=s=>{if(D)D.textContent=s;};log('dbg: bound OK (touchstart 대기)');

function toggleTimer(){const day=dayOf(todayStr());if(day.running){day.studySec=liveStudySec(day);day.running=false;day.startedAt=0;}else{day.running=true;day.startedAt=Date.now();}save();paint();}
function editGoal(){const day=dayOf(todayStr());
  openSheet(`<h3>오늘 공부 목표</h3><div class="field"><label>목표 시간</label><input id="g_h" type="number" min="0.5" step="0.5" value="${day.goalH||DB.settings.goalHours}"></div>
    <div class="setrow"><div><div class="stxt">기본값으로 저장</div><div class="ssub">앞으로 새 날짜에 적용</div></div><div class="toggle" id="g_def" onclick="this.classList.toggle('on')"></div></div>
    <div class="btnrow"><button class="btn ghost" onclick="closeSheet()">취소</button><button class="btn primary" onclick="saveGoal()">저장</button></div>`);}
function saveGoal(){const v=parseFloat($('#g_h').value)||DB.settings.goalHours;dayOf(todayStr()).goalH=v;if($('#g_def').classList.contains('on'))DB.settings.goalHours=v;save();closeSheet();paint();}
function setDay(k,v){dayOf(todayStr())[k]=v;save();}
let addCat={type:'none',subjectId:'',projectId:'',mileId:''}, _catCtx={kind:'today'}, addDraft='', popDraft='';
function placeTaskGrouped(t){const day=DB.tasks.filter(x=>x.date===t.date).sort((a,b)=>(a.ord??1e9)-(b.ord??1e9));
  const cat=t.subjectId||t.projectId||'';let idx=day.length;
  if(cat){for(let k=day.length-1;k>=0;k--){const c=day[k].subjectId||day[k].projectId||'';if(c===cat){idx=k+1;break;}}}
  day.splice(idx,0,t);day.forEach((x,k)=>x.ord=k);}
function addTask(){const i=$('#newTask'),v=i.value.trim();if(!v)return;const t={id:uid(),date:todayStr(),text:v,done:false};
  if(addCat.type==='subject'&&addCat.subjectId)t.subjectId=addCat.subjectId;
  if(addCat.type==='project'&&addCat.projectId){t.projectId=addCat.projectId;if(addCat.mileId)t.mileId=addCat.mileId;}
  placeTaskGrouped(t);DB.tasks.push(t);addDraft="";save();paint();}
function tTask(id){const t=DB.tasks.find(x=>x.id===id);if(t){t.done=!t.done;if(t.done)t.doneAt=Date.now();else delete t.doneAt;save();paint();}}
function dTask(id){const t=DB.tasks.find(x=>x.id===id);if(t&&t.repeatId){const r=DB.repeats.find(rr=>rr.id===t.repeatId);if(r){r.ex=r.ex||[];if(r.ex.indexOf(t.date)<0)r.ex.push(t.date);}}DB.tasks=DB.tasks.filter(x=>x.id!==id);save();paint();}
function odKeep(id){const t=DB.tasks.find(x=>x.id===id);if(t){t.odk=true;save();paint();}}
function resched(id,when){const t=DB.tasks.find(x=>x.id===id);if(!t)return;t.date=when==='today'?todayStr():tomorrowStr();save();paint();}
function clearOverdue(){const t=todayStr();DB.tasks.forEach(x=>{if(!x.done&&x.date<t)x.date=t;});save();paint();}

function pickCat(type,id){if(type==='subject')addCat={type:'subject',subjectId:id,projectId:'',mileId:''};else if(type==='project')addCat={type:'project',subjectId:'',projectId:id,mileId:''};else addCat={type:'none',subjectId:'',projectId:'',mileId:''};applyCat();}

/* repeats UI */
let _rf='daily';

function repFreq(el){document.querySelectorAll('#r_freq button').forEach(b=>b.classList.remove('on'));el.classList.add('on');_rf=el.dataset.f;$('#r_wd_w').classList.toggle('hidden',_rf!=='weekly');$('#r_iv_w').classList.toggle('hidden',_rf!=='interval');}
function repFreqLabel(r){if(r.freq==='daily')return '매일';if(r.freq==='weekly')return (r.weekdays||[]).map(i=>DOW[i]).join('');return r.interval+'일마다';}
function saveRepeat(){const t=$('#r_t').value.trim();if(!t)return toast('할 일을 입력해');
  const rep={id:uid(),text:t,freq:_rf,start:$('#r_s').value||todayStr(),end:$('#r_e').value||''};
  if(_rf==='weekly'){rep.weekdays=[...document.querySelectorAll('#r_wd button.on')].map(b=>+b.dataset.d);if(!rep.weekdays.length)return toast('요일을 골라');}

function delRepeat(id){actionSheet('이 반복의 모든 항목을 삭제할까? (이미 만든 것 포함)',[{label:'시리즈 삭제',danger:true,fn:()=>{DB.repeats=DB.repeats.filter(r=>r.id!==id);DB.tasks=DB.tasks.filter(t=>t.repeatId!==id);save();closeSheet();paint();toast('삭제됨');}}]);}

/* ===== CALENDAR ===== */
function calHTML(){
  $('#headTtl').textContent='달력';$('#headSub').textContent='';
  const y=curMonth.getFullYear(),m=curMonth.getMonth();
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  let h=`<div class="calhd"><button class="arw" onclick="moveMonth(-1)">‹</button><div class="mlabel num">${y}년 ${m+1}월</div><button class="arw" onclick="moveMonth(1)">›</button></div>`;
  h+=`<div class="caldow">${DOW.map((d,i)=>`<div class="${i===0?'sun':''}">${d}</div>`).join('')}</div><div class="calgrid">`;
  let cells=0;
  for(let i=0;i<first;i++){h+=`<div class="cell blank"></div>`;cells++;}
  for(let dn=1;dn<=days;dn++){const s=`${y}-${pad(m+1)}-${pad(dn)}`,dow=new Date(y,m,dn).getDay();
    const ts=tasksOn(s),dm=ddaysOn(s);
    const colors=[...new Set(ts.map(t=>{const g=taskTag(t);return g?g.color:null;}).filter(Boolean))].slice(0,4);
    if(ts.length&&!colors.length)colors.push('var(--ink3)');
    h+=`<div class="cell ${dow===0?'sun':''} ${s===todayStr()?'today':''}" onclick="dayPopup('${s}')"><div class="dn num">${dn}</div>
      ${dm.length?'<div class="exmark"></div>':''}<div class="dots">${colors.map(c=>`<span class="dotc" style="background:${c}"></span>`).join('')}</div></div>`;cells++;}
  while(cells%7!==0){h+=`<div class="cell blank"></div>`;cells++;}
  while(cells<42){h+=`<div class="cell blank"></div>`;cells++;}
  h+='</div>';return h;}
function moveMonth(n){curMonth=new Date(curMonth.getFullYear(),curMonth.getMonth()+n,1);materializeWindow();slidePage(calHTML(),n>0?1:-1);}

function dayPopup(s,dir){
  const ts=tasksOn(s),dm=ddaysOn(s),day=DB.days[s];
  const d=parseYmd(s),isT=s===todayStr(),isPast=s<todayStr();
  let h=`<div class="popnav"><button class="parw" onclick="popDay('${s}',-1)">‹</button>
    <div class="poptitle"><div class="pd1">${d.getMonth()+1}월 ${d.getDate()}일 (${DOW[d.getDay()]})</div>${isT?'<div class="pd2">오늘</div>':''}</div>
    <button class="parw" onclick="popDay('${s}',1)">›</button></div>`;
  if(dm.length){h+=`<div style="margin-bottom:14px">`;
    dm.forEach(x=>{h+=`<div class="ctag" style="display:inline-block;margin:0 6px 6px 0;background:${hexRgba(x.color,.16)};color:${x.color}">${x.kind==='exam'?'🎯 ':''}${esc(x.name)}</div>`;});h+=`</div>`;}
  if(isPast){
    const dn=ts.filter(t=>t.done).length;
    h+=`<div class="card" style="margin-bottom:14px"><div style="display:flex;flex-wrap:wrap;gap:8px 18px;font-size:13.5px;font-weight:600;color:var(--ink2)">
      <span>✅ 체크 <b style="color:var(--ink)">${dn}/${ts.length}</b></span>
      ${day&&day.studySec?`<span>📚 ${fmtHM(day.studySec)}</span>`:''}</div></div>`;
  }
  h+=`<div class="clist" id="ckListPop" style="margin-bottom:12px">`;
  if(ts.length){const sorted=[...ts.filter(t=>t.done).sort((a,b)=>(a.doneAt||0)-(b.doneAt||0)),...ts.filter(t=>!t.done).sort((a,b)=>(a.ord??1e9)-(b.ord??1e9))];
    sorted.forEach(t=>{const tg=taskTag(t);
    h+=`<div class="citem" data-id="${t.id}"><div class="cbox ${t.done?'done':''}" onclick="popToggle('${t.id}','${s}')"></div>
      <span class="ctxt ${t.done?'done':''}">${esc(t.text)}</span>
      ${tg?`<span class="ctag" style="background:${hexRgba(tg.color,.16)};color:${tg.color}">${esc(tg.label)}</span>`:''}
      <button class="cdel" onclick="popDel('${t.id}','${s}')">×</button></div>`;});}
  else h+=`<div class="empty" style="box-shadow:none;background:transparent;border:none">이 날 할 일이 없어.</div>`;
  h+=`</div><div class="addrow" style="margin-bottom:8px"><input id="popTask" placeholder="할 일 추가" value="${esc(popDraft)}" oninput="popDraft=this.value" onkeydown="if(event.key==='Enter')addTaskPopup('${s}')">
    <button class="catchip" onclick="openCatPicker({kind:'popup',date:'${s}'})">${catChipLabel()}</button>
    <button class="addbtn" onclick="addTaskPopup('${s}')">+</button></div>`;
  openSheet(h);
  const body=$('.sheetbody');
  if(dir&&body){body.style.setProperty('--pd',dir>0?'46px':'-46px');body.classList.remove('pslide');void body.offsetWidth;body.classList.add('pslide');body.addEventListener('animationend',()=>body.classList.remove('pslide'),{once:true});}
  attachPopupSwipe(s);
  attachReorder('ckListPop',()=>{save(false);dayPopup(s);});}
function popDay(s,n){const d=parseYmd(s);d.setDate(d.getDate()+n);const ns=ymd(d);materialize(ns);dayPopup(ns,n);}
function popToggle(id,s){const t=DB.tasks.find(x=>x.id===id);if(t){t.done=!t.done;if(t.done)t.doneAt=Date.now();else delete t.doneAt;save(false);dayPopup(s);}}
function popDel(id,s){const t=DB.tasks.find(x=>x.id===id);if(t&&t.repeatId){const r=DB.repeats.find(rr=>rr.id===t.repeatId);if(r){r.ex=r.ex||[];if(r.ex.indexOf(t.date)<0)r.ex.push(t.date);}}DB.tasks=DB.tasks.filter(x=>x.id!==id);save(false);dayPopup(s);}
function addTaskPopup(s){const i=$('#popTask'),v=i.value.trim();if(!v)return;const t={id:uid(),date:s,text:v,done:false};
  if(addCat.type==='subject'&&addCat.subjectId)t.subjectId=addCat.subjectId;
  if(addCat.type==='project'&&addCat.projectId){t.projectId=addCat.projectId;if(addCat.mileId)t.mileId=addCat.mileId;}
  placeTaskGrouped(t);DB.tasks.push(t);popDraft="";save(false);dayPopup(s);}
function attachPopupSwipe(s){const sh=$('#sheet');if(!sh)return;let x0=null,y0=null,block=false;
  sh.ontouchstart=e=>{const t=e.touches[0];x0=t.clientX;y0=t.clientY;block=!!(e.target.closest&&e.target.closest('input,textarea,select,.addrow'));};
  sh.ontouchend=e=>{if(x0==null)return;const dx=e.changedTouches[0].clientX-x0,dy=e.changedTouches[0].clientY-y0;
    if(!block&&Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.6)popDay(s,dx<0?1:-1);x0=null;};}

  [...DB.projects].sort((a,b)=>projSortKey(a)-projSortKey(b)).forEach(p=>{

function setRange(n){statRange=n;paint();}
function barChart(days,vals,color,fixedMax){const max=fixedMax||Math.max(1,...vals)*1.15,show=statRange<=7;
  let bars=vals.map((v,i)=>{const hp=Math.max(0,Math.min(100,v/max*100));const lbl=show?`<div style="font-size:9px;color:var(--ink3);margin-top:5px;text-align:center">${DOW[parseYmd(days[i]).getDay()]}</div>`:'';
    return `<div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%"><div style="font-size:9px;color:var(--ink2);font-weight:700;margin-bottom:3px">${v?(fixedMax?Math.round(v):v.toFixed(1)):''}</div><div style="width:${show?'62%':'78%'};height:${hp}%;min-height:${v?'3px':'0'};background:${color};border-radius:5px 5px 2px 2px"></div>${lbl}</div>`;}).join('');
  return `<div style="display:flex;align-items:flex-end;gap:${show?'4px':'2px'};height:130px">${bars}</div>`;}
function dualChart(days,a,aMax,aCol,b,bMax,bCol){const W=320,H=120,pad=10,n=days.length,xAt=i=>pad+(W-2*pad)*(n<2?0.5:i/(n-1));
  const series=(vals,max,col)=>{const pts=vals.map((v,i)=>v==null?null:{x:xAt(i),y:H-pad-(H-2*pad)*Math.min(1,v/max),v});let path='',st=false;
    pts.forEach(p=>{if(!p){st=false;return;}path+=(st?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)+' ';st=true;});
    const dots=pts.filter(Boolean).map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="${col}"/>`).join('');
    return `<path d="${path}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}`;};
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:130px;overflow:visible">${series(a,aMax,aCol)}${series(b,bMax,bCol)}</svg>`;}
function pearson(a,b){const xs=[],ys=[];for(let i=0;i<a.length;i++){if(a[i]!=null&&b[i]!=null){xs.push(a[i]);ys.push(b[i]);}}
  const n=xs.length;if(n<3)return null;const mx=xs.reduce((p,c)=>p+c,0)/n,my=ys.reduce((p,c)=>p+c,0)/n;let num=0,dx=0,dy=0;
  for(let i=0;i<n;i++){const A=xs[i]-mx,B=ys[i]-my;num+=A*B;dx+=A*A;dy+=B*B;}if(dx===0||dy===0)return null;return num/Math.sqrt(dx*dy);}

let HJ={loaded:false,loading:false,notes:[],err:'',expanded:new Set(),open:null,md:{},noteLoading:false,noteErr:'',scanning:false,scanned:false};
function hjReload(){HJ.loaded=false;HJ.err='';paint();}
function hjToggle(p){p=decodeURIComponent(p);if(HJ.expanded.has(p))HJ.expanded.delete(p);else HJ.expanded.add(p);paint();}
function hjBuildTree(paths){
  const root={folders:{},files:[]};
  for(const p of paths){const parts=p.split('/');let node=root;
    for(let i=0;i<parts.length-1;i++){const seg=parts[i];if(!node.folders[seg])node.folders[seg]={folders:{},files:[],path:parts.slice(0,i+1).join('/')};node=node.folders[seg];}
    node.files.push({name:parts[parts.length-1],path:p});}
  return root;
}
function hjRenderTree(node,depth,c){
  const branch=c.branch||'main';
  const link=p=>`https://github.com/${c.repo}/blob/${branch}/${p.split('/').map(encodeURIComponent).join('/')}`;
  let h='';
  Object.keys(node.folders).sort((a,b)=>a.localeCompare(b,'ko')).forEach(name=>{
    const f=node.folders[name],open=HJ.expanded.has(f.path),n=Object.keys(f.folders).length+f.files.length;
    h+=`<div class="hjfold" style="padding-left:${depth*16}px" onclick="hjToggle('${encodeURIComponent(f.path)}')"><span class="hjcaret ${open?'open':''}">▸</span><span class="hjfname">${esc(name)}</span><span class="hjcount">${n}</span></div>`;
    if(open)h+=hjRenderTree(f,depth+1,c);
  });
  node.files.sort((a,b)=>a.name.localeCompare(b.name,'ko')).forEach(fl=>{
    if(/\.md$/i.test(fl.name))
      h+=`<div class="hjfile" style="padding-left:${depth*16+20}px;cursor:pointer" onclick="openHjNote('${encodeURIComponent(fl.path)}')"><span class="hjfnm">${esc(fl.name.replace(/\.md$/i,''))}</span><span class="hjgh">›</span></div>`;
    else
      h+=`<a href="${link(fl.path)}" target="_blank" rel="noopener" class="hjfile" style="padding-left:${depth*16+20}px"><span class="hjfnm">${esc(fl.name)}</span><span class="hjgh">↗</span></a>`;
  });
  return h;
}
function hakjongHTML(){
  $('#headTtl').textContent='학종';$('#headSub').textContent='브레인 볼트 · GitHub';
  const c=DB.hakjong||{};

  if(!HJ.loaded){loadHakjong();return `<div class="empty">불러오는 중…</div>`;}
  if(HJ.err)return `<div class="empty">${esc(HJ.err)}<br><button class="btn ghost" style="margin-top:12px" onclick="hjReload()">다시 시도</button></div>`;
  if(!HJ.notes.length)return `<div class="empty">노트 없음</div>`;
  if(HJ.open){

    const gh=`https://github.com/${c.repo}/blob/${branch}/${HJ.open.split('/').map(encodeURIComponent).join('/')}`;
    const title=HJ.open.split('/').pop().replace(/\.md$/i,'');
    let body;
    if(HJ.noteLoading)body=`<div class="empty">불러오는 중…</div>`;
    else if(HJ.noteErr)body=`<div class="empty">${esc(HJ.noteErr)}<br><button class="btn ghost" style="margin-top:12px" onclick="openHjNote('${encodeURIComponent(HJ.open)}')">다시</button></div>`;
    else body=hjMd(HJ.md[HJ.open])+hjBacklinks(HJ.open);
    return `<div class="hjnav"><button class="bk" onclick="hjBack()">‹ 볼트</button><a class="hjgh" href="${gh}" target="_blank" rel="noopener" style="margin-left:auto">GitHub ↗</a></div><div class="head" style="padding:2px 4px 10px"><div class="ttl" style="font-size:22px;line-height:1.2">${esc(title)}</div></div><div class="card">${body}</div>`;
  }
  const nMd=HJ.notes.filter(p=>/\.md$/i.test(p)).length;

  return `<div class="eyebrow" style="justify-content:space-between"><span>볼트 · ${nMd}개 노트</span><span class="add" onclick="hjReload()">↻ 새로고침</span></div><div class="card" style="padding:6px 8px">${hjRenderTree(tree,0,c)}</div>`;

async function openHjNote(path){
  path=decodeURIComponent(path);HJ.open=path;HJ.noteErr='';
  const sc=document.querySelector('.scroll');if(sc)sc.scrollTop=0;
  if(HJ.md[path]!==undefined){paint();return;}
  HJ.noteLoading=true;paint();
  const c=DB.hakjong||{};const branch=c.branch||'main';
  try{
    const res=await fetch(`https://api.github.com/repos/${c.repo}/contents/${path.split('/').map(encodeURIComponent).join('/')}?ref=${encodeURIComponent(branch)}`,{headers:{Authorization:'Bearer '+c.token,Accept:'application/vnd.github.raw+json'}});
    if(!res.ok)throw new Error('GitHub '+res.status);
    HJ.md[path]=await res.text();
  }catch(e){HJ.noteErr=e.message;}
  HJ.noteLoading=false;if(tab==='hakjong')paint();
}
function hjResolve(name){name=name.replace(/\.md$/i,'').trim();
  return HJ.notes.find(p=>p.replace(/\.md$/i,'').split('/').pop()===name)
    ||HJ.notes.find(p=>p.replace(/\.md$/i,'').split('/').pop().toLowerCase()===name.toLowerCase())||null;}
function hjOpenLink(name){const p=hjResolve(name);if(p)openHjNote(encodeURIComponent(p));else toast('노트 없음: '+name);}
function hjMd(src){
  let tags=[];
  src=(src||'').replace(/^﻿/,'').replace(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?/,(m,y)=>{(y.match(/-\s*([^\n]+)/g)||[]).forEach(x=>tags.push(x.replace(/-\s*/,'').trim()));return'';});
  src=src.replace(/!?\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g,(m,a,b)=>{a=a.trim();const label=(b||a).trim();
    if(/\.(png|jpe?g|gif|svg|webp|pdf|hwp|docx?|xlsx?|pptx?|c|py|ipynb)$/i.test(a))return '`📎 '+label+'`';
    return '['+label+'](wl:'+encodeURIComponent(a)+')';});
  let html;
  try{html=window.marked?marked.parse(src,{breaks:true,gfm:true}):('<pre>'+esc(src)+'</pre>');}catch{html='<pre>'+esc(src)+'</pre>';}
  html=html.replace(/href="wl:([^"]+)"/g,(m,x)=>`class="hjwl" onclick="hjOpenLink('${decodeURIComponent(x).replace(/'/g,"\\'").replace(/"/g,'&quot;')}')"`);
  const tagH=tags.length?`<div class="hjtags">${tags.map(t=>`<span class="tg">${esc(t)}</span>`).join('')}</div>`:'';
  return tagH+'<div class="hjdoc">'+html+'</div>';
}
async function hjScanAll(){
  const c=DB.hakjong||{};const branch=c.branch||'main';
  const todo=HJ.notes.filter(p=>/\.md$/i.test(p)&&HJ.md[p]===undefined);
  HJ.scanning=true;paint();
  for(const p of todo){try{const r=await fetch(`https://api.github.com/repos/${c.repo}/contents/${p.split('/').map(encodeURIComponent).join('/')}?ref=${encodeURIComponent(branch)}`,{headers:{Authorization:'Bearer '+c.token,Accept:'application/vnd.github.raw+json'}});if(r.ok)HJ.md[p]=await r.text();}catch{}}
  HJ.scanning=false;HJ.scanned=true;if(tab==='hakjong')paint();
}
function hjBacklinks(path){
  const base=path.split('/').pop().replace(/\.md$/i,'').replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const re=new RegExp('\\[\\[\\s*'+base+'\\s*(\\||\\])');
  const hits=Object.keys(HJ.md).filter(p=>p!==path&&re.test(HJ.md[p]||''));
  let h=`<div class="hjbl"><div class="blh"><span>백링크${hits.length?' · '+hits.length:''}</span>`;
  if(!HJ.scanned)h+=`<span class="add" style="font-weight:700;cursor:pointer" onclick="hjScanAll()">${HJ.scanning?'스캔 중…':'전체 스캔'}</span>`;
  h+=`</div>`;
  if(hits.length)h+=hits.sort().map(p=>`<div class="hjfile" style="padding-left:0;cursor:pointer" onclick="openHjNote('${encodeURIComponent(p)}')"><span class="hjfnm">${esc(p.split('/').pop().replace(/\.md$/i,''))}</span><span class="hjgh">›</span></div>`).join('');
  else h+=`<div style="font-size:12.5px;color:var(--ink3)">${HJ.scanned?'없음':'전체 스캔하면 이 노트를 가리키는 노트가 다 떠요'}</div>`;
  return h+`</div>`;
}
async function loadHakjong(){
  const c=DB.hakjong||{};if(!c.repo||!c.token||HJ.loading)return;HJ.loading=true;
  try{
    const branch=c.branch||'main';
    const res=await fetch(`https://api.github.com/repos/${c.repo}/git/trees/${encodeURIComponent(branch)}?recursive=1`,{headers:{Authorization:'Bearer '+c.token,Accept:'application/vnd.github+json'}});
    if(!res.ok)throw new Error('GitHub 오류 '+res.status+(res.status===404?' — 저장소/브랜치 확인':res.status===401?' — 토큰 확인':''));
    const j=await res.json();
    const skip=/(^|\/)(claude-vault|\.obsidian|마스터_archive|node_modules)(\/|$)|(^|\/)\.[^/]+$|\.gitignore$/;
    HJ.notes=(j.tree||[]).filter(x=>x.type==='blob'&&!skip.test(x.path)).map(x=>x.path);
    HJ.err='';
  }catch(e){HJ.err=e.message;HJ.notes=[];}
  HJ.loaded=true;HJ.loading=false;if(tab==='hakjong')paint();if(document.getElementById('sq'))runSearch();
}

function toggleSync(){$('#sy_on').classList.toggle('on');DB.sync.enabled=$('#sy_on').classList.contains('on');

  if(DB.sync.enabled){if(!DB.sync.url||!DB.sync.key)toast('주소·비밀키 먼저 넣어');else syncPull({auto:true});}
  setStat(DB.sync.enabled?(navigator.onLine?'동기화 켜짐':'오프라인'):'동기화 꺼짐 (로컬 전용)','idle');}

function nowHM(){return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}
function syncCreds(){const url=(DB.sync.url||($('#sy_url')?$('#sy_url').value:'')||'').trim().replace(/\/+$/,'');const key=(DB.sync.key||($('#sy_key')?$('#sy_key').value:'')||'').trim();return{url,key};}
async function syncPush(silent){const{url,key}=syncCreds();
  if(!url||!key){if(!silent)setStat('주소와 비밀키를 넣어','err');return;}
  if(!navigator.onLine){if(!silent)setStat('오프라인 — 연결되면 올라감','idle');return;}
  DB.sync.url=url;DB.sync.key=key;const data=Object.assign({},DB);delete data.sync;
  try{if(!silent)setStat('올리는 중…','idle');
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','X-Sync-Key':key},body:JSON.stringify({data})});
    if(!res.ok)throw new Error(res.status);
    DB.sync.last=Date.now();localStorage.setItem(KEY,JSON.stringify(DB));
    setStat('올림 완료 · '+nowHM(),'ok');if(!silent)toast('올렸어');
  }catch(e){setStat('실패: '+e.message,'err');if(!silent)toast('동기화 실패');}}
async function syncPull(opts){opts=opts||{};const{url,key}=syncCreds();
  if(!url||!key){if(!opts.silent)setStat('주소와 비밀키를 넣어','err');return;}
  if(!navigator.onLine){if(!opts.silent)setStat('오프라인','err');return;}
  DB.sync.url=url;DB.sync.key=key;
  try{if(!opts.silent)setStat('내려받는 중…','idle');
    const res=await fetch(url,{headers:{'Content-Type':'application/json','X-Sync-Key':key}});
    if(!res.ok)throw new Error(res.status);
    const j=await res.json();const remote=j&&j.data;
    if(!remote||!remote.v){if(!opts.silent)setStat('서버에 데이터 없음 — 먼저 올려','idle');return;}
    if(opts.auto&&remote.modified&&DB.modified&&remote.modified<=DB.modified){setStat('최신 상태 · '+nowHM(),'ok');return;}
    if(!opts.auto&&remote.modified&&DB.modified&&remote.modified<DB.modified){if(!confirm('서버 데이터가 이 기기보다 오래됐어. 덮어쓸까?'))return setStat('취소됨','idle');}
    const sy=DB.sync;remote.sync=sy;DB=remote;localStorage.setItem(KEY,JSON.stringify(DB));load();DB.sync.last=Date.now();localStorage.setItem(KEY,JSON.stringify(DB));applyTheme();paint();
    setStat('내려받기 완료 · '+nowHM(),'ok');if(!opts.silent){toast('내려받았어');closeSheet();}
  }catch(e){if(!opts.silent)setStat('실패: '+e.message,'err');}}

function importJSON(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.v)throw 0;d.sync=DB.sync;DB=d;localStorage.setItem(KEY,JSON.stringify(DB));load();applyTheme();closeSheet();paint();toast('가져왔어');}catch{toast('파일 형식 오류');}};r.readAsText(f);}

window.addEventListener('popstate',function(){
  let handled=false;
  if(closeAnyOverlay())handled=true;
  else if(tab==='hakjong'&&HJ.open){hjBack();handled=true;}
  else if(_tabHist.length){tab=_tabHist.pop();updateNav();scrollTop0();paint();handled=true;}
  else if(tab!=='today'){tab='today';updateNav();scrollTop0();paint();handled=true;}
  if(handled)pushGuard();/* 앱 유지: 다음 뒤로가기도 잡게 재무장. 홈에서 더 없으면 그대로 종료 */
});

/* ===== boot ===== */
window.addEventListener('online',()=>{if(DB.sync.enabled)syncPush(true);});
load();applyTheme();paint();pushGuard();
if(DB.sync.enabled&&navigator.onLine)syncPull({auto:true,silent:true});
if(DB.sync.enabled&&DB.sync.gistId&&navigator.onLine)pullGist();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
  let _ref=false;navigator.serviceWorker.addEventListener('controllerchange',()=>{if(_ref)return;_ref=true;location.reload();});}
</script>
</body>
</html>
